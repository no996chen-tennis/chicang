name: Update holding disclosures

on:
  workflow_dispatch:
  schedule:
    - cron: "20 11 * * 1-5"
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run data:update
        env:
          SEC_USER_AGENT: chicang/0.2 GitHubActions public-data-research contact@example.com
      - run: npm run build
      - name: Commit updated feed
        run: |
          if git diff --quiet -- public/data/holding-feed.json; then
            echo "No data changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/holding-feed.json
            git commit -m "chore: update holding disclosure feed"
            git push
          fi
      - name: Deploy Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        run: npx wrangler pages deploy dist --project-name chicang-watch --branch main
